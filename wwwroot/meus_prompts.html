<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <script>
    // Lógica de Proteção de Rota
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = 'login.html';
    }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meus Prompts | Facility.IA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Estilos baseados no Dashboard */
        body { margin: 0; background: #050507; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; color: white; }
        .layout { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: rgba(10, 10, 12, 0.95); border-right: 1px solid rgba(255,255,255,0.05); padding: 30px; display: flex; flex-direction: column; position: fixed; height: 100vh; }
        .content { margin-left: 250px; padding: 40px; width: 100%; }
        
        /* Grid de Prompts */
        .prompts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 30px; }
        .prompt-card { background: #161b22; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 20px; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .prompt-card:hover { border-color: var(--primary); transform: translateY(-3px); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .card-title { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .card-body { color: #aaa; font-size: 0.9rem; line-height: 1.5; flex: 1; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; margin-bottom: 20px; }
        .card-actions { display: flex; gap: 10px; justify-content: flex-end; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px; }
        
        .btn-action { background: rgba(255,255,255,0.05); border: none; color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.8rem; }
        .btn-action:hover { background: rgba(255,255,255,0.1); }
        .btn-delete:hover { background: rgba(255, 85, 85, 0.2); color: #ff5555; }

        .add-btn { background: var(--primary); color: black; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; }

        /* Modal Edição */
        .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; display:none; align-items:center; justify-content:center; }
        .modal-box { background: #1c2128; padding: 30px; border-radius: 15px; width: 500px; max-width: 90%; border: 1px solid rgba(255,255,255,0.1); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; color: #888; margin-bottom: 5px; font-size: 0.9rem; }
        .input-group input, .input-group textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; padding: 10px; color: white; border-radius: 6px; font-family: inherit; }
        .input-group textarea { height: 150px; resize: vertical; }
    </style>
</head>
<body>
    <div class="layout">
        <nav class="sidebar">
            <div class="logo" style="color:white; font-weight:bold; font-size:1.2rem; margin-bottom:40px;">FACILITY<span style="color:#00ff88;">.IA</span></div>
            <a href="dashboard.html" style="color:#888; text-decoration:none; margin-bottom:20px; display:block;"><i class="fas fa-arrow-left"></i> Voltar ao Dashboard</a>
        </nav>

        <div class="content">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2>Meus Prompts Personalizados</h2>
                <button class="add-btn" onclick="openModal()"><i class="fas fa-plus"></i> Novo Prompt</button>
            </div>

            <div class="prompts-grid" id="promptsGrid">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="promptModal">
        <div class="modal-box">
            <h3 id="modalTitle" style="margin-top:0;">Novo Prompt</h3>
            <div class="input-group">
                <label>Título (Atalho)</label>
                <input type="text" id="pTitle" placeholder="Ex: Resumo Jurídico Padrão">
            </div>
            <div class="input-group">
                <label>Conteúdo do Prompt</label>
                <textarea id="pContent" placeholder="Digite as instruções do prompt..."></textarea>
            </div>
            <div style="text-align:right; margin-top:20px;">
                <button class="btn-action" onclick="closeModal()">Cancelar</button>
                <button class="add-btn" style="display:inline-flex;" onclick="savePrompt()">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        let prompts = JSON.parse(localStorage.getItem('userPrompts') || '[]');
        let editIndex = -1;

        function renderPrompts() {
            const grid = document.getElementById('promptsGrid');
            grid.innerHTML = "";
            
            if(prompts.length === 0) {
                grid.innerHTML = `<div style="color:#666; grid-column:1/-1; text-align:center; padding:50px;">Nenhum prompt salvo. Crie o primeiro!</div>`;
                return;
            }

            prompts.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="prompt-card">
                        <div class="card-header">
                            <span class="card-title">${p.title}</span>
                            <i class="fas fa-quote-right" style="color:#333;"></i>
                        </div>
                        <div class="card-body">${p.content}</div>
                        <div class="card-actions">
                            <button class="btn-action" onclick="openModal(${index})"><i class="fas fa-edit"></i> Editar</button>
                            <button class="btn-action btn-delete" onclick="deletePrompt(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(index = -1) {
            editIndex = index;
            document.getElementById('promptModal').style.display = 'flex';
            if(index >= 0) {
                document.getElementById('modalTitle').innerText = "Editar Prompt";
                document.getElementById('pTitle').value = prompts[index].title;
                document.getElementById('pContent').value = prompts[index].content;
            } else {
                document.getElementById('modalTitle').innerText = "Novo Prompt";
                document.getElementById('pTitle').value = "";
                document.getElementById('pContent').value = "";
            }
        }

        function closeModal() { document.getElementById('promptModal').style.display = 'none'; }

        function savePrompt() {
            const title = document.getElementById('pTitle').value;
            const content = document.getElementById('pContent').value;
            
            if(!title || !content) return alert("Preencha todos os campos");

            if(editIndex >= 0) {
                prompts[editIndex] = { title, content };
            } else {
                prompts.push({ title, content });
            }
            
            localStorage.setItem('userPrompts', JSON.stringify(prompts));
            renderPrompts();
            closeModal();
        }

        function deletePrompt(index) {
            if(confirm("Tem certeza?")) {
                prompts.splice(index, 1);
                localStorage.setItem('userPrompts', JSON.stringify(prompts));
                renderPrompts();
            }
        }

        renderPrompts();
    </script>
</body>
</html>
